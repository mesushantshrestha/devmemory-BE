spring.application.name=devmemory-BE

# postgres Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/devmemory
spring.datasource.username=devmemory
spring.datasource.password=devmemory
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Server Configuration
app.cors.allowed.origins=http://localhost:4200, https://app.devmemory.me
