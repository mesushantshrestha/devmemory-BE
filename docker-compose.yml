services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: devmemory
      POSTGRES_USER: devmemory
      POSTGRES_PASSWORD: devmemory
    volumes:
      - devmemory_db:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U devmemory -d devmemory" ]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    image: devmemory-backend:latest
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/devmemory
      SPRING_DATASOURCE_USERNAME: devmemory
      SPRING_DATASOURCE_PASSWORD: devmemory
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  devmemory_db:
